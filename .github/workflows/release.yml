name: Publish tagged release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Enable locked pnpm
        run: corepack install --global pnpm@11.13.0

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Validate release channel
        run: corepack pnpm release:check

      - name: Validate release build
        run: corepack pnpm check

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "$GITHUB_REF_NAME" == *"-beta."* ]]; then
            gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes --prerelease
          else
            gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes
          fi
